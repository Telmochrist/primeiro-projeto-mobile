<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>
</head>

<body>
    <input placeholder="Digite o nome do contato">
    <p></p>
    <button onclick="search()">Procurar contato</button>

</body>

<script>

    let p = document.querySelector("p")
    let input = document.querySelector("input")

    const contacts = [
        { name: "Rodolfo", number: "(19) 94949-9494" },
        { name: "Paula", number: "(19) 95959-9595" },
        { name: "José", number: "(19) 99999-9999" },
        { name: "Mario", number: "(19) 88888-8888" }
    ]

    function search() {
        
        for(const contact of contacts){

            console.log(contact)

            if(input.value.toLowerCase() === contact.name.toLowerCase()){
                p.innerHTML = `Contato encontrado Nome: ${contact.name} Tel: ${contact.number}`

                break
            } else {
                p.innerHTML = "Contato não encontrado, tente novamente!"
            }
        }
    }

</script>

</html>
